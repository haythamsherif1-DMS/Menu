<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منيو مطعم نور</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ef4444">
    <link rel="apple-touch-icon" href="https://nour2030.neocities.org/NOUR%20Menu/Nour%20Menu.png">

    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #ffffff; }
        
        /* شاشة التحميل السريعة */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .mention-god {
            font-size: 24px;
            font-weight: bold;
            color: #ef4444; /* لون مطعم نور */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            animation: pulse 1.5s infinite; /* حركة نبض خفيفة */
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border: none;
            visibility: hidden; /* مخفي حتى يكتمل التحميل */
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="mention-god">اذكر الله</div>
    </div>

    <iframe 
        id="menuFrame"
        src="https://script.google.com/macros/s/AKfycbw8CJs6MsAbMvg3OWaymlAWft5RAg8wL91Stcb58S_YbJ3wE7yFBvxiB19SYtSo_Zln/exec"
        onload="showMenu()">
    </iframe>

    <script>
        function showMenu() {
            // إخفاء شاشة التحميل فوراً
            document.getElementById('loader').style.display = 'none';
            // إظهار المنيو فوراً
            document.getElementById('menuFrame').style.visibility = 'visible';
        }

        // تسجيل الـ Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
            .then(() => console.log('Service Worker Registered'));
        }
    </script>
</body>
</html>
